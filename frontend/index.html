<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0b07;--sf:#161310;--br:#2a2418;--go:#c9a84c;--gl:#e8c97a;--gd:#7a6230;--tx:#e8dfc8;--mu:#8a7d65;--fa:#3a3428;--ik:#111009;--gr:#1a4a3a;--gb:#2a6a52;--gt:#5ecfa0;--tl:#0a3030;--tb:#1a5a5a;--tt:#4ecfcf}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:"Scheherazade New",serif;overflow:hidden;font-feature-settings:"locl" 1}
.app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto}
.hd{background:var(--sf);border-bottom:1px solid var(--br);padding:.85rem 1.1rem .65rem;flex-shrink:0}
.brand{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.65rem}
.bt{font-size:19px;color:var(--go);font-weight:700}
.bs{font-size:10px;color:var(--mu);font-family:"Scheherazade New",serif}

.tab{padding:.33rem .7rem;border-radius:9px;border:1px solid var(--br);background:transparent;color:var(--mu);font-family:"Scheherazade New",serif;font-size:13px;cursor:pointer;transition:all .15s;text-align:center}
.tab.on{background:var(--go);color:var(--ik);border-color:var(--go);font-weight:700}
.row{display:flex;gap:7px;align-items:stretch}
.iw{flex:1;background:var(--ik);border:1px solid var(--br);border-radius:12px;display:flex;align-items:center;padding:0 .75rem;transition:border-color .2s}
.iw:focus-within{border-color:var(--gd)}
input[type=number],input[type=search]{width:100%;background:transparent;border:none;outline:none;color:var(--tx);font-family:"Scheherazade New",serif;font-size:20px;text-align:center;padding:.48rem 0}
input[type=number]{direction:ltr}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=search]::placeholder{color:var(--fa);font-size:13px;font-family:"Scheherazade New",serif}
input[type=search]::-webkit-search-cancel-button{-webkit-appearance:none}
.gbtn{background:var(--go);color:var(--ik);border:none;border-radius:12px;padding:0 1rem;font-family:"Scheherazade New",serif;font-size:17px;font-weight:700;cursor:pointer;flex-shrink:0}
.gbtn:active{opacity:.85}
.nr{display:flex;gap:5px;margin-top:.6rem}
.nb{flex:1;background:transparent;border:1px solid var(--br);border-radius:9px;color:var(--mu);font-family:"Scheherazade New",serif;font-size:14px;padding:.32rem 0;cursor:pointer}
.nb:active{color:var(--go);border-color:var(--gd)}
.nb:disabled{opacity:.25;pointer-events:none}
.ct{flex:1;overflow-y:auto;padding:1rem .95rem;scroll-behavior:smooth}
.ct::-webkit-scrollbar{width:3px}
.ct::-webkit-scrollbar-thumb{background:var(--br);border-radius:99px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:1.5rem;padding-bottom:3rem}
.home-cards{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:340px}
.hcard{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:1.1rem 1.4rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:1rem}
.hcard:hover{border-color:var(--go);background:var(--fa)}
.hcard:active{transform:scale(.98)}
.hcard-icon{font-size:28px;flex-shrink:0}
.hcard-text{}
.hcard-title{font-size:17px;color:var(--go);font-weight:700}
.hcard-sub{font-size:11px;color:var(--mu);margin-top:.2rem}
.zcard{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:1rem 1.2rem;margin-bottom:.6rem;cursor:pointer;transition:all .15s}
.zcard:hover{border-color:var(--go);background:var(--fa)}
.zcard.bakhsh{border-color:var(--gd);background:var(--tl)}
.zcard-title{font-size:15px;color:var(--go);font-weight:700;margin-bottom:.3rem}
.zcard.bakhsh .zcard-title{font-size:16px;color:var(--gl)}
.zcard-preview{font-size:12px;color:var(--mu);line-height:1.7;direction:rtl}
.zsec{padding:1rem 0}
.zsec-title{font-size:18px;color:var(--go);font-weight:700;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--br)}
.zsec-body{font-size:14px;line-height:2.1;color:var(--tx);direction:rtl;white-space:pre-wrap}
.eo{font-size:44px;opacity:.15}
.eh{font-size:13px;color:var(--mu);text-align:center;line-height:2;font-family:"Scheherazade New",serif}
.pm{animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pmeta{text-align:center;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--br)}
.pnum{font-size:10px;letter-spacing:.12em;color:var(--mu);font-family:"Scheherazade New",serif;margin-bottom:.25rem}
.ptitle{font-size:19px;color:var(--go);font-weight:700}
.psub{font-size:13px;color:var(--mu);margin-top:.2rem}
.cp{margin-bottom:.7rem;background:var(--sf);border:1px solid var(--br);border-radius:12px;overflow:hidden}
.cp.gbm{border-color:var(--gd);background:#1a1508}
.cp.tbm{border-color:var(--tb);background:var(--tl)}
.cpb{padding:.7rem .85rem}
.ms{font-size:18px;line-height:1.9;color:var(--tx)}
.ms.s2{border-top:1px solid var(--br);margin-top:.35rem;padding-top:.35rem;color:var(--mu)}
mark{background:var(--gd);color:var(--gl);border-radius:3px;padding:0 2px}
.ca{display:flex;border-top:1px solid var(--br)}
.ca button{flex:1;background:transparent;border:none;border-left:1px solid var(--br);padding:.38rem 0;font-size:15px;cursor:pointer;color:var(--mu)}
.ca button:first-child{border-left:none}
.ca button:active{background:var(--br)}
.ca button.gon{color:var(--go)}
.ca button.ton{color:var(--tt)}
.nd{font-size:13px;color:var(--gt);padding:.45rem .85rem;border-top:1px solid var(--gb);background:var(--gr);line-height:1.6;cursor:pointer}
.pf{text-align:center;font-size:11px;color:var(--fa);margin-top:.3rem;font-family:"Scheherazade New",serif}
.rh{font-size:12px;color:var(--mu);font-family:"Scheherazade New",serif;margin-bottom:.7rem;text-align:center}
.ri{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:.7rem .85rem;margin-bottom:.55rem;cursor:pointer}
.ri.tr{border-color:var(--tb)}
.rt{font-size:10px;color:var(--tt);font-family:"Scheherazade New",serif;margin-bottom:.2rem}
.rti{font-size:15px;color:var(--go);font-weight:700;margin-bottom:.25rem}
.rp{font-size:14px;color:var(--mu);line-height:1.75}
.bst{font-size:12px;color:var(--mu);font-family:"Scheherazade New",serif;margin-bottom:.6rem;padding-bottom:.35rem;border-bottom:1px solid var(--br)}
.bi{background:var(--sf);border-radius:12px;padding:.7rem .85rem;margin-bottom:.55rem;cursor:pointer}
.bi.gbx{border:1px solid var(--gd)}
.bi.tbx{border:1px solid var(--tb)}
.bpt{font-size:12px;color:var(--go);margin-bottom:.3rem;font-weight:700}
.bm2{font-size:15px;color:var(--tx);line-height:1.85}
.bnt{font-size:12px;color:var(--gt);margin-top:.35rem;padding-top:.35rem;border-top:1px solid var(--br);line-height:1.6}
.bdl{float:left;background:transparent;border:none;color:var(--fa);font-size:15px;cursor:pointer;padding:0 3px;font-family:"Scheherazade New",serif}
.nb2{text-align:center;padding:3rem 1rem;color:var(--mu);font-size:14px;line-height:2;font-family:"Scheherazade New",serif}
.er{text-align:center;padding:2rem;color:#a06060;font-size:14px;line-height:2;font-family:"Scheherazade New",serif}
.nr2{text-align:center;padding:2.5rem 1rem;color:var(--mu);font-size:14px;line-height:2;font-family:"Scheherazade New",serif}
.ft{background:var(--sf);border-top:1px solid var(--br);padding:.5rem 1.1rem;display:flex;justify-content:space-between;font-size:11px;color:var(--fa);font-family:"Scheherazade New",serif;flex-shrink:0}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.mbg.open{opacity:1;pointer-events:all}
.mo{background:var(--sf);border-radius:16px 16px 0 0;border-top:1px solid var(--br);width:100%;max-width:500px;padding:1.1rem 1.1rem 2rem;transform:translateY(100%);transition:transform .25s}
.mbg.open .mo{transform:translateY(0)}
.mt2{font-size:13px;color:var(--mu);font-family:"Scheherazade New",serif;margin-bottom:.7rem;text-align:center}
.mv{font-size:17px;color:var(--go);line-height:1.9;margin-bottom:.9rem;padding-bottom:.9rem;border-bottom:1px solid var(--br);text-align:center}
.mta{width:100%;background:var(--ik);border:1px solid var(--br);border-radius:10px;padding:.65rem .85rem;color:var(--tx);font-family:"Scheherazade New",serif;font-size:16px;line-height:1.7;resize:none;height:100px;outline:none;direction:rtl}
.mta:focus{border-color:var(--gd)}
.mbs{display:flex;gap:8px;margin-top:.75rem}
.mbs button{flex:1;padding:.5rem;border-radius:10px;border:1px solid var(--br);font-family:"Scheherazade New",serif;font-size:15px;cursor:pointer}
.msv{background:var(--go);color:var(--ik);border-color:var(--go);font-weight:700}
.mcl{background:transparent;color:var(--mu)}
/* Auth modal */
.auth-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.auth-bg.open{opacity:1;pointer-events:all}
.auth-modal{background:var(--bg2,#1a1712);border:1px solid var(--br);border-radius:16px;padding:1.5rem;width:min(360px,92vw);display:flex;flex-direction:column;gap:1rem}
.auth-title{font-size:1.2rem;font-weight:700;text-align:center;color:var(--fg)}
.auth-tabs{display:flex;gap:6px;background:rgba(255,255,255,.05);border-radius:10px;padding:4px}
.auth-tabs button{flex:1;padding:.4rem;border-radius:8px;border:none;background:transparent;color:var(--mu);font-family:"Scheherazade New",serif;font-size:15px;cursor:pointer;transition:background .2s,color .2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.auth-tabs button.on{background:var(--go);color:var(--ik);font-weight:700}
.auth-form{display:flex;flex-direction:column;gap:.6rem}
.auth-form input{background:rgba(255,255,255,.07);border:1px solid var(--br);border-radius:10px;padding:.55rem .75rem;color:var(--fg);font-family:"Scheherazade New",serif;font-size:15px;outline:none;direction:ltr}
.auth-form input:focus{border-color:var(--go)}
.auth-submit{background:var(--go);color:var(--ik);border:none;border-radius:10px;padding:.6rem;font-family:"Scheherazade New",serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:.25rem;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
.auth-err{color:#e55;font-size:13px;min-height:18px;text-align:center}
/* keyword glossary */
.kw-filters{display:flex;gap:6px;overflow-x:auto;padding:.85rem .95rem .65rem;margin:0 -.95rem 0;scrollbar-width:none;-webkit-overflow-scrolling:touch;position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--br)}
.kw-filters::-webkit-scrollbar{display:none}
.kw-chip{flex:0 0 auto;padding:.35rem .85rem;border-radius:99px;border:1px solid var(--br);background:transparent;color:var(--mu);font-family:"Scheherazade New",serif;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s}
.kw-chip:hover{border-color:var(--gd);color:var(--tx)}
.kw-chip.on{background:var(--go);border-color:var(--go);color:var(--ik);font-weight:700}
.kw-list{padding-top:.6rem}
.kw-count-hint{font-size:11px;color:var(--fa);text-align:center;margin-bottom:.7rem;font-family:"Scheherazade New",serif;letter-spacing:.04em}
.kw-card{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:.7rem .85rem;margin-bottom:.55rem;cursor:pointer;transition:all .15s;display:block;position:relative}
.kw-card:hover{border-color:var(--gd);background:var(--fa)}
.kw-card:active{transform:scale(.99)}
.kw-card-tag{font-size:10px;color:var(--gd);font-family:"Scheherazade New",serif;margin-bottom:.2rem;letter-spacing:.04em;display:flex;align-items:center;gap:.3rem}
.kw-card-tag::before{content:'✦';color:var(--go);font-size:11px;line-height:1}
.kw-card-title{display:flex;align-items:baseline;justify-content:space-between;gap:.6rem;margin-bottom:.25rem}
.kw-card-word{font-size:17px;color:var(--go);font-weight:700;line-height:1.2}
.kw-card-count{font-size:13px;color:var(--gl);font-variant-numeric:tabular-nums;font-family:"Scheherazade New",serif;flex-shrink:0}
.kw-card-preview{font-size:13px;color:var(--mu);line-height:1.75;font-family:"Scheherazade New",serif}
.kw-detail{padding-top:.2rem}
.kw-d-back{background:transparent;border:none;color:var(--mu);font-family:"Scheherazade New",serif;font-size:14px;cursor:pointer;padding:.3rem 0;margin-bottom:.6rem;display:inline-flex;align-items:center;gap:.3rem}
.kw-d-back:hover{color:var(--go)}
.kw-d-head{text-align:center;padding:1rem 0 1.3rem;border-bottom:1px solid var(--br);margin-bottom:1.1rem}
.kw-d-word{font-size:42px;color:var(--go);font-weight:700;line-height:1;letter-spacing:.02em;margin-bottom:.55rem}
.kw-d-cat{font-size:12px;color:var(--mu);font-family:"Scheherazade New",serif;letter-spacing:.03em}
.kw-d-section{margin-bottom:1.2rem}
.kw-d-section h4{font-size:11px;color:var(--gd);font-family:"Scheherazade New",serif;letter-spacing:.12em;margin-bottom:.4rem;font-weight:400;display:flex;align-items:center;gap:.4rem}
.kw-d-section h4::before{content:'';display:inline-block;width:14px;height:1px;background:var(--gd)}
.kw-d-meaning{font-size:16px;color:var(--tx);line-height:1.95;text-align:justify;text-justify:inter-word}
.kw-d-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.kw-d-tag{background:var(--ik);border:1px solid var(--br);border-radius:10px;padding:.4rem .7rem;font-size:13px;color:var(--tx);font-family:"Scheherazade New",serif;line-height:1.6;display:flex;flex-direction:column;gap:.15rem;min-width:30%;flex:1}
.kw-d-tag-label{font-size:9px;color:var(--mu);letter-spacing:.08em}
.kw-d-tag-val{color:var(--gl)}
.kw-d-tag-val.empty{color:var(--fa);font-size:14px}
.kw-d-stats{display:flex;gap:.5rem;background:var(--ik);border:1px solid var(--br);border-radius:12px;padding:.7rem .85rem}
.kw-d-stat{flex:1;text-align:center;border-left:1px solid var(--br);padding:0 .3rem}
.kw-d-stat:first-child{border-left:none}
.kw-d-stat-val{font-size:20px;color:var(--go);font-weight:700;font-variant-numeric:tabular-nums;font-family:"Scheherazade New",serif;line-height:1.1}
.kw-d-stat-lab{font-size:10px;color:var(--mu);margin-top:.2rem;font-family:"Scheherazade New",serif}
.kw-d-poems-head{font-size:13px;color:var(--mu);font-family:"Scheherazade New",serif;margin:.4rem 0 .65rem;text-align:center;padding-bottom:.5rem;border-bottom:1px solid var(--br)}
.kw-d-poems-head b{color:var(--go);font-weight:700;font-variant-numeric:tabular-nums}
.kw-section{margin-top:.65rem;padding:.6rem .85rem;background:var(--sf);border:1px solid var(--br);border-radius:12px}
.kw-sec-t{font-size:11px;color:var(--mu);margin-bottom:.5rem}
.kw-tags{display:flex;flex-wrap:wrap;gap:5px}
.kw-tag{background:var(--fa);border:1px solid var(--gd);border-radius:20px;padding:.18rem .65rem;font-size:13px;color:var(--go);cursor:pointer;transition:background .12s}
.kw-tag:active{background:var(--br)}
/* keyword result in search */
.ri.kw:hover{border-color:var(--gd)}
.ri.kw .rt{color:var(--gd);display:flex;align-items:center;gap:.3rem}
.ri.kw .rt::before{content:'✦';color:var(--go);font-size:11px;line-height:1}
.ri.kw .rti-row{display:flex;align-items:baseline;justify-content:space-between;gap:.6rem;margin-bottom:.25rem}
.ri.kw .rti-row .rti{margin-bottom:0}
.ri.kw .rti-count{font-size:13px;color:var(--gl);font-variant-numeric:tabular-nums;font-family:"Scheherazade New",serif;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
<header class="hd">
  <div class="brand" id="btn-home" style="cursor:pointer"><span class="bt">دیوان بیدل دهلوی</span><span class="bs">۲۸۲۷ غزل · ترجیع‌بند · آفلاین</span></div>
  <div class="row">
    <div class="iw"><input type="search" id="ki" placeholder="شماره یا کلمه جستجو کن..." autocomplete="off"></div>
    <button class="gbtn" id="btn-srch">جستجو</button>
    <button class="tab" id="tab-bm">★</button>
  </div>
  <div class="nr" id="gnr" style="display:none">
    <button class="nb" id="gback" style="display:none">↩ بازگشت</button>
    <button class="nb" id="gp">→ قبلی</button>
    <button class="nb" id="gn">بعدی ←</button>
  </div>
  <div class="nr" id="tnr" style="display:none">
    <button class="nb" id="tback" style="display:none">↩ بازگشت</button>
    <button class="nb" id="tp">→ قبلی</button>
    <button class="nb" id="tallbands">همه بندها</button>
    <button class="nb" id="tn">بعدی ←</button>
  </div>
</header>
<main class="ct" id="ct"></main>
<footer class="ft"><span>منبع: گنجور · آفلاین</span><span id="fi"></span></footer>
</div>
<div class="mbg" id="mbg">
  <div class="mo">
    <div class="mt2">یادداشت برای بیت</div>
    <div class="mv" id="mv"></div>
    <textarea class="mta" id="mn" placeholder="یادداشت خود را بنویسید..."></textarea>
    <div class="mbs">
      <button class="mcl" id="btn-mcancel">انصراف</button>
      <button class="msv" id="btn-msave">ذخیره ✓</button>
    </div>
  </div>
</div>
<div class="auth-bg" id="auth-modal-bg">
  <div class="auth-modal">
    <div class="auth-title">بیدل دهلوی</div>
    <div class="auth-tabs">
      <button id="auth-tab-login" class="on">ورود</button>
      <button id="auth-tab-register">ثبت‌نام</button>
    </div>
    <form class="auth-form" id="auth-form-login" style="display:flex" onsubmit="return false">
      <input type="email" id="auth-email" placeholder="ایمیل" autocomplete="email" dir="ltr">
      <input type="password" id="auth-password" placeholder="رمز عبور" autocomplete="current-password" dir="ltr">
      <div class="auth-err" id="auth-login-err"></div>
      <button class="auth-submit" id="auth-login-btn">ورود</button>
    </form>
    <form class="auth-form" id="auth-form-register" style="display:none" onsubmit="return false">
      <input type="text" id="auth-username" placeholder="نام کاربری" autocomplete="username">
      <input type="email" id="auth-reg-email" placeholder="ایمیل" autocomplete="email" dir="ltr">
      <input type="password" id="auth-reg-password" placeholder="رمز عبور" autocomplete="new-password" dir="ltr">
      <div class="auth-err" id="auth-register-err"></div>
      <button class="auth-submit" id="auth-register-btn">ثبت‌نام</button>
    </form>
  </div>
</div>
<script>
(async function(){
const TOT=2827, TB=34;
let cg=0, ct=0, atab='g', mkey=null, lastSearch=null;
let _poemCache={}, _listCache={};
function toFa(n){return String(n).replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]);}

// API
const API_URL = window.location.protocol === 'file:' || window.location.hostname === 'localhost'
  ? 'http://localhost:8000'
  : 'https://' + window.location.hostname + '/api';
let _bms={}, _nts={};

function getToken(){return localStorage.getItem('bidel_token')}
function setToken(t){if(t)localStorage.setItem('bidel_token',t);else localStorage.removeItem('bidel_token')}
function authHeaders(){return{'Authorization':'Bearer '+getToken(),'Content-Type':'application/json'}}
function showAuthModal(){document.getElementById('auth-modal-bg').classList.add('open')}
function hideAuthModal(){document.getElementById('auth-modal-bg').classList.remove('open')}

function getBms(){return _bms}
function getNts(){return _nts}

async function loadUserData(){
  const token=getToken();
  if(!token){showAuthModal();return;}
  const [rb,rn]=await Promise.all([
    fetch(API_URL+'/bookmarks',{headers:{'Authorization':'Bearer '+token}}),
    fetch(API_URL+'/notes',{headers:{'Authorization':'Bearer '+token}})
  ]);
  if(rb.status===401||rn.status===401){setToken(null);showAuthModal();return;}
  const bmsArr=await rb.json(), ntsArr=await rn.json();
  // fetch poems for bookmarks (deduplicated)
  const _toFetch={};
  for(const b of bmsArr) _toFetch[b.poem_type+'_'+b.poem_id]=b;
  await Promise.all(Object.values(_toFetch).map(async b=>{
    const ep=b.poem_type==='g'?'/poems/ghazal/':'/poems/terjee/';
    const r=await fetch(API_URL+ep+b.poem_id);
    if(r.ok) _poemCache[b.poem_type+'_'+b.poem_id]=await r.json();
  }));
  _bms={};
  for(const b of bmsArr){
    const key=bkey(b.poem_type,b.poem_id,b.couplet_index);
    const poem=_poemCache[b.poem_type+'_'+b.poem_id];
    const c=poem?(poem.couplets[b.couplet_index]||['','']):['',''];
    const ti2=b.poem_type==='g'?(poem?.title||''):'بند '+b.poem_id;
    _bms[key]={tp:b.poem_type,id:b.poem_id,ci:b.couplet_index,ti2,c};
  }
  _nts={};
  for(const n of ntsArr){
    _nts[bkey(n.poem_type,n.poem_id,n.couplet_index)]=n.text;
  }
  ubt();
}
function bkey(tp,id,ci){return tp+'_'+id+'_'+ci}

// Elements
const ni=document.getElementById('ni');
const ti=document.getElementById('ti');
const ki=document.getElementById('ki');
const ctEl=document.getElementById('ct');
const gnr=document.getElementById('gnr');
const tnr=document.getElementById('tnr');
const gp=document.getElementById('gp');
const gn=document.getElementById('gn');
const tp2=document.getElementById('tp');
const tn2=document.getElementById('tn');
const fi=document.getElementById('fi');
const bmt=document.getElementById('tab-bm');
const mbg=document.getElementById('mbg');

// Tab switching
function sw(t){
  atab=t;
  document.getElementById('tab-bm').classList.toggle('on',t==='bm');
  if(t==='bm') showBm();
}

// Tab buttons
document.getElementById('tab-bm').addEventListener('click',()=>sw('bm'));
document.getElementById('btn-home').addEventListener('click', showHome);
document.getElementById('gback').addEventListener('click',()=>{
  if(lastSearch){
    if(lastSearch._backFn){const f=lastSearch._backFn;lastSearch=null;f();return;}
    ctEl.innerHTML=lastSearch.html;ctEl.scrollTop=0;fi.textContent=lastSearch.label;gnr.style.display='none';
  }
});
document.getElementById('tback').addEventListener('click',()=>{
  if(lastSearch){ctEl.innerHTML=lastSearch.html;ctEl.scrollTop=0;fi.textContent=lastSearch.label;tnr.style.display='none';}
});

// Go buttons

document.getElementById('btn-srch').addEventListener('click', doSrch);
document.getElementById('ki').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSrch();}});
ki.addEventListener('keydown',e=>{if(e.key==='Enter')doSrch()});

// Nav buttons
gp.addEventListener('click',()=>showG(Math.max(1,cg-1)));
gn.addEventListener('click',()=>showG(Math.min(TOT,cg+1)));

tp2.addEventListener('click',()=>showT(Math.max(1,ct-1)));
tn2.addEventListener('click',()=>showT(Math.min(TB,ct+1)));
document.getElementById('tallbands').addEventListener('click', allBands);

// Modal buttons
document.getElementById('btn-mcancel').addEventListener('click', cmob);
document.getElementById('btn-msave').addEventListener('click', svn);
mbg.addEventListener('click',e=>{if(e.target===mbg)cmob()});

// ── HELPERS ──
function ubt(){const n=Object.keys(getBms()).length; bmt.textContent='★'+(n?' '+toFa(n):'')}
if(getToken())loadUserData();else showAuthModal();

function hl(txt,kw){
  if(!kw||!txt) return txt||'';
  var out='',i=0,kl=kw.length;
  while(i<txt.length){
    var j=txt.indexOf(kw,i);
    if(j===-1){out+=txt.slice(i);break;}
    out+=txt.slice(i,j)+'<mark>'+kw+'</mark>';
    i=j+kl;
  }
  return out;
}

function mkCp(m1,m2,key,isBm,note,type,kw){
  const cls = isBm?(type==='g'?' gbm':' tbm'):'';
  let h='<div class="cp'+cls+'" data-key="'+key+'">';
  h+='<div class="cpb"><div class="ms">'+hl(m1,kw)+'</div>';
  if(m2) h+='<div class="ms s2">'+hl(m2,kw)+'</div>';
  h+='</div>';
  if(note) h+='<div class="nd" data-action="note" data-key="'+key+'">📝 '+note+'</div>';
  h+='<div class="ca">';
  h+='<button data-action="bm" class="'+(isBm?(type==='g'?'gon':'ton'):'')+'">'+(isBm?'★':'☆')+'</button>';
  h+='<button data-action="note">📝</button>';
  h+='<button data-action="copy">📋</button>';
  h+='</div></div>';
  return h;
}

// ── EVENT DELEGATION ──
ctEl.addEventListener('click',function(e){
  // zand section cards
  const zc=e.target.closest('.zcard');
  if(zc && !e.target.closest('button')){
    showZand(parseInt(zc.dataset.zid));
    return;
  }
  // keyword result card in search
  const kwri=e.target.closest('.ri.kw');
  if(kwri){const w=decodeURIComponent(kwri.dataset.kwword);const sh=lastSearch?.html||'';const sl=lastSearch?.label||'';showKeywordDetail(w,()=>{ctEl.innerHTML=sh;ctEl.scrollTop=0;fi.textContent=sl;});return;}
  // result items
  const ri=e.target.closest('.ri');
  if(ri && !e.target.closest('button')){
    const kw=ri.dataset.kw?decodeURIComponent(ri.dataset.kw):'';
    if(ri.dataset.tp==='g'){sw('g');showG(parseInt(ri.dataset.n),kw);}
    else{sw('tr');showT(parseInt(ri.dataset.n),kw);}
    return;
  }
  // bookmark items
  const bi=e.target.closest('.bi');
  if(bi && !e.target.closest('button')){
    if(bi.dataset.tp==='g'){sw('g');showG(parseInt(bi.dataset.id));}
    else{sw('tr');showT(parseInt(bi.dataset.id));}
    return;
  }
  // back button in keyword detail
  if(e.target.closest('[data-action="kw-back"]')){const f=_kwDetailBack||allKeywords;_kwDetailBack=null;f();return;}
  // keyword filter chip
  const kwChip=e.target.closest('.kw-chip');
  if(kwChip&&kwChip.dataset.kwcat!==undefined){renderKeywords(kwChip.dataset.kwcat);return;}
  // keyword card in keyword list
  const kwCard=e.target.closest('.kw-card');
  if(kwCard){const w=decodeURIComponent(kwCard.dataset.kwword);showKeywordDetail(w,()=>allKeywords());return;}
  // keyword tag in ghazal page
  const kwTag=e.target.closest('.kw-tag');
  if(kwTag){const w=decodeURIComponent(kwTag.dataset.word);showKeywordDetail(w,()=>showG(cg));return;}
  // delete bookmark button
  if(e.target.closest('.bdl')){
    const k=e.target.closest('.bdl').dataset.key;
    const p2=k.split('_');
    toggleBm(p2[0],parseInt(p2[1]),parseInt(p2[2])).then(()=>showBm()); return;
  }
  // couplet buttons
  const btn=e.target.closest('.ca button');
  const cp=e.target.closest('.cp');
  const nd=e.target.closest('.nd');
  if(!cp) return;
  const key=cp.dataset.key;
  const parts=key.split('_'); // tp_id_ci
  const tp=parts[0], id=parseInt(parts[1]), ci=parseInt(parts[2]);

  if(nd && !btn){
    openModal(key, getVerse(tp,id,ci)); return;
  }
  if(!btn) return;
  const action=btn.dataset.action;
  if(action==='bm'){toggleBm(tp,id,ci); return;}
  if(action==='note'){openModal(key, getVerse(tp,id,ci)); return;}
  if(action==='copy'){
    const [m1,m2]=getCouplet(tp,id,ci);
    var txt=m1+(m2?'\n'+m2:'');
    var el=document.createElement('div');
    el.contentEditable=true;
    el.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;overflow:hidden;opacity:0.01;white-space:pre;';
    el.innerText=txt;
    document.body.appendChild(el);
    var sel=window.getSelection();
    var range=document.createRange();
    range.selectNodeContents(el);
    sel.removeAllRanges();
    sel.addRange(range);
    try{document.execCommand('copy');}catch(e){}
    sel.removeAllRanges();
    document.body.removeChild(el);
    const o=btn.textContent; btn.textContent='✓'; setTimeout(()=>btn.textContent=o,1000);
  }
});


function getVerse(tp,id,ci){
  const [m1,m2]=getCouplet(tp,id,ci);
  return m1+(m2?' / '+m2:'');
}
function getCouplet(tp,id,ci){
  const poem=_poemCache[tp+'_'+id];
  return poem?(poem.couplets[ci]||['','']):['',''];
}

// ── GHAZAL ──
function goG(){
  const n=parseInt(ki.value.trim());
  if(!n||n<1||n>TOT){ctEl.innerHTML='<div class="er">شماره بین ۱ تا '+TOT+'</div>';return}
  showG(n);
}
async function showG(n,kw){
  cg=n;
  const [resp,kwR]=await Promise.all([

// ── SEARCH ──
async function doSrch(){
  const raw=ki.value.trim(); if(!raw) return;
  atab='kw';
  document.getElementById('tab-bm').classList.remove('on');
  gnr.style.display='none'; tnr.style.display='none';

  // عدد؟ → مستقیم به غزل یا بند برو
  const persianMap={'۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
  const normalized=raw.trim().replace(/[۰-۹]/g,d=>persianMap[d]);
  const num=parseInt(normalized);
  if(!isNaN(num) && num>0 && String(num)===normalized){
    if(num>=1 && num<=TOT){sw('g'); showG(num); return;}
    if(num>=1 && num<=TB){sw('tr'); showT(num); return;}
    ctEl.innerHTML='<div class="nr2">شماره '+toFa(num)+' یافت نشد</div>'; fi.textContent='';
    return;
  }

  // کلمه → جستجو از API
  const kw=raw;
  // keyword matches from cache (if loaded)
  const kwMatches=[];
  if(_kwCache){
    for(const k of _kwCache){
      if(k.word===kw||k.word.includes(kw)||kw.includes(k.word)){kwMatches.push(k);if(kwMatches.length>=3)break;}
    }
  }
  const [rg,rt]=await Promise.all([
    fetch(API_URL+'/poems/search?q='+encodeURIComponent(kw)+'&type=g').then(r=>r.json()),
    fetch(API_URL+'/poems/search?q='+encodeURIComponent(kw)+'&type=t').then(r=>r.json()),
  ]);
  const ms=[];
  for(const r of (rg.results||[])){
    const c=r.matches[0]?.couplet||['',''];
    ms.push({tp:'g',n:r.number,ti2:r.title,pv:c[0]+(c[1]?' / '+c[1]:'')});
  }
  for(const r of (rt.results||[])){
    const c=r.matches[0]?.couplet||['',''];
    ms.push({tp:'t',n:r.number,ti2:'بند '+toFa(r.number),pv:c[0]+(c[1]?' / '+c[1]:'')});
  }
  if(!ms.length&&!kwMatches.length){ctEl.innerHTML='<div class="nr2">«'+kw+'» یافت نشد</div>';fi.textContent='';return}
  let h='<div class="rh">'+toFa(ms.length)+' نتیجه برای «'+kw+'»'+(kwMatches.length?' · '+toFa(kwMatches.length)+' واژه':'')+'</div>';
  for(const k of kwMatches){
    h+='<div class="ri kw" data-kwword="'+encodeURIComponent(k.word)+'">';
    h+='<div class="rt">واژه'+(k.category?' · '+k.category:'')+'</div>';
    h+='<div class="rti-row"><span class="rti">'+hl(k.word,kw)+'</span>'+(k.count?'<span class="rti-count">'+toFa(k.count)+' بار</span>':'')+'</div>';
    if(k.meaning)h+='<div class="rp">'+k.meaning.substring(0,70)+(k.meaning.length>70?'…':'')+'</div>';
    h+='</div>';
  }
  for(const m of ms){
    h+='<div class="ri'+(m.tp==='t'?' tr':'')+'" data-tp="'+m.tp+'" data-n="'+m.n+'" data-kw="'+kw+'">';
    if(m.tp==='t') h+='<div class="rt">ترجیع‌بند</div>';
    h+='<div class="rti">'+m.ti2+'</div><div class="rp">'+hl(m.pv,kw)+'</div></div>';
  }
  lastSearch={html:h, label:toFa(ms.length)+' نتیجه'};
  ctEl.innerHTML=h; ctEl.scrollTop=0; fi.textContent=toFa(ms.length)+' نتیجه'+(kwMatches.length?' · '+toFa(kwMatches.length)+' واژه':'');
}

function switchAuthTab(tab){

  document.getElementById('auth-form-login').style.display=tab==='login'?'flex':'none';

function addTap(id, handler){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',function(e){e.preventDefault();handler();},{passive:false});
  el.addEventListener('click',handler);
}
addTap('auth-tab-login',()=>switchAuthTab('login'));

async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const err=document.getElementById('auth-login-err');
  err.textContent='';
  if(!email||!password){err.textContent='ایمیل و رمز عبور الزامی است';return;}
  const resp=await fetch(API_URL+'/auth/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email,password})
  });
  if(!resp.ok){err.textContent='ایمیل یا رمز عبور اشتباه است';return;}
  const data=await resp.json();
  setToken(data.access_token);
  hideAuthModal();
  loadUserData();
}

  const username=document.getElementById('auth-username').value.trim();

  const resp=await fetch(API_URL+'/auth/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,email,password})
  });
  if(!resp.ok){const d=await resp.json();err.textContent=d.detail||'خطا در ثبت‌نام';return;}
  document.getElementById('auth-email').value=email;
  document.getElementById('auth-password').value=password;
  switchAuthTab('login');
  await doLogin();
}

addTap('auth-login-btn',doLogin);
addTap('auth-register-btn',doRegister);
document.getElementById('auth-email').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('auth-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('auth-reg-password').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});

showHome();

})(); // end IIFE
</script>
