<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>بیدلی</title>
<meta name="theme-color" content="#f0ebde">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="بیدل">
<link rel="preload" href="fonts/IRANYekanX-Regular.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="fonts/IRANYekanX-Bold.ttf" as="font" type="font/ttf" crossorigin>
<style>
@font-face{font-family:"IRANYekanX";src:url("fonts/IRANYekanX-Light.ttf") format("truetype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"IRANYekanX";src:url("fonts/IRANYekanX-Regular.ttf") format("truetype");font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:"IRANYekanX";src:url("fonts/IRANYekanX-Medium.ttf") format("truetype");font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:"IRANYekanX";src:url("fonts/IRANYekanX-DemiBold.ttf") format("truetype");font-weight:600;font-style:normal;font-display:swap}
@font-face{font-family:"IRANYekanX";src:url("fonts/IRANYekanX-Bold.ttf") format("truetype");font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:"IRANYekanX";src:url("fonts/IRANYekanX-Black.ttf") format("truetype");font-weight:900;font-style:normal;font-display:swap}
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Sage Garden palette */
  --bg:#f0ebde;        /* ivory base */
  --sf:#f7f3e6;        /* card surface */
  --sf2:#fbf8ee;       /* lifted surface */
  --br:#c9c1a6;        /* border */
  --br2:#dcd5be;       /* soft border */
  --ik:#e8e2d0;        /* input bg */
  --tx:#1a2218;        /* primary text */
  --tx2:#3a4830;       /* deep sage text */
  --mu:#6a7a5a;        /* sage muted */
  --fa:#a8a48c;        /* faint */
  --vf:#b8b09a;        /* very faint */
  --go:#5a7048;        /* primary sage */
  --gl:#7a9060;        /* sage hover */
  --gd:#3a4830;        /* deep sage */
  --gh:#e9eedb;        /* sage tint bg */
  --sa:#c89030;        /* saffron accent */
  --sa2:#a87420;       /* deep saffron */
  --sah:#f4ebd0;       /* saffron tint */
  --er:#a04030;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:"IRANYekanX",sans-serif;overflow:hidden;font-feature-settings:"locl" 1}
.fa{font-family:"IRANYekanX",sans-serif}
.app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;background:var(--bg);position:relative}

/* ─── HEADER ───────────────────────────────── */
.hd{flex-shrink:0;background:var(--bg);padding:14px 16px 10px;border-bottom:1px solid var(--br2);display:flex;align-items:center;gap:10px;min-height:54px}
.hd-back{background:transparent;border:none;color:var(--gd);font-size:22px;cursor:pointer;padding:4px 6px;line-height:1;display:none}
.hd-back.show{display:inline-flex}
.hd-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--gd),var(--go));color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;letter-spacing:-0.02em;box-shadow:0 1px 2px rgba(58,72,48,0.15);position:relative;overflow:hidden}
.hd-logo::after{content:'';position:absolute;top:-4px;right:-4px;width:10px;height:10px;border-radius:99px;background:var(--sa);opacity:0.85}
.hd-title{flex:1;min-width:0}
.hd-t1{font-size:19px;font-weight:700;color:var(--gd);line-height:1.2;font-family:"IRANYekanX",sans-serif}
.hd-t2{font-size:11px;color:var(--mu);font-family:"IRANYekanX",sans-serif;letter-spacing:0.04em;margin-top:1px}
.hd-icon{background:transparent;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:6px 8px;line-height:1}
.hd-icon:active{color:var(--go)}

/* poem prev/next sub-bar */
.subnav{flex-shrink:0;display:flex;gap:5px;padding:8px 14px 10px;background:var(--bg);border-bottom:1px solid var(--br2)}
.subnav.hide{display:none}
.subnav button{flex:1;background:transparent;border:1px solid var(--br);border-radius:9px;color:var(--mu);font-family:"IRANYekanX",sans-serif;font-size:14px;padding:5px 0;cursor:pointer;transition:all .15s}
.subnav button:hover:not(:disabled){border-color:var(--go);color:var(--gd)}
.subnav button:disabled{opacity:.3}

/* ─── MAIN CONTENT ─────────────────────────── */
.ct{flex:1;overflow-y:auto;padding:16px 14px 16px;scroll-behavior:smooth}
.ct::-webkit-scrollbar{width:4px}
.ct::-webkit-scrollbar-thumb{background:var(--vf);border-radius:99px}
.ct::-webkit-scrollbar-track{background:transparent}

/* ─── BOTTOM NAV ───────────────────────────── */
.bn{flex-shrink:0;background:var(--sf2);border-top:1px solid var(--br);display:flex;padding:4px 4px calc(4px + env(safe-area-inset-bottom));gap:2px;box-shadow:0 -1px 0 var(--br2)}
.bn-item{flex:1;background:transparent;border:none;cursor:pointer;padding:7px 0 5px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mu);font-family:"IRANYekanX",sans-serif;border-radius:10px;transition:background .15s}
.bn-ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1}
.bn-ic svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6}
.bn-lab{font-size:10.5px;letter-spacing:0.02em;font-weight:500}
.bn-item.on{color:var(--go)}
.bn-item.on .bn-lab{font-weight:700}
.bn-item.on .bn-ic{background:var(--gh);border-radius:99px;padding:0;width:48px;height:24px;color:var(--go)}

/* ─── HOME ─────────────────────────────────── */
.home{padding:4px 4px}
.home-search{display:flex;align-items:center;gap:8px;background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:11px 14px;margin:0 0 14px;cursor:text;transition:border-color .15s}
.home-search:hover{border-color:var(--go)}
.home-search:active{background:var(--sf2)}
.home-search-ic{color:var(--mu);font-size:16px;display:flex}
.home-search-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.home-search-tx{flex:1;color:var(--vf);font-family:"IRANYekanX",sans-serif;font-size:15px}
.home-search-hint{font-size:10px;color:var(--fa);font-family:"IRANYekanX",sans-serif;letter-spacing:0.06em;flex-shrink:0;white-space:nowrap}
.home-greet{padding:6px 4px 16px}
.home-hello{font-size:11px;color:var(--mu);font-family:"IRANYekanX",sans-serif;letter-spacing:0.08em;margin-bottom:3px}
.home-day{font-size:24px;color:var(--gd);font-weight:700;line-height:1.2}

.continue{background:var(--sf);border:1px solid var(--br2);border-radius:16px;padding:14px 16px;margin-bottom:14px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s}
.continue:hover{border-color:var(--go)}
.continue:active{transform:scale(.99)}
.continue-tag{font-size:10px;color:var(--mu);letter-spacing:0.12em;font-family:"IRANYekanX",sans-serif;margin-bottom:6px}
.continue-title{font-size:16px;color:var(--gd);font-weight:700;margin-bottom:3px}
.continue-sub{font-size:13px;color:var(--mu);line-height:1.7}
.continue-bar{margin-top:10px;height:3px;background:var(--ik);border-radius:99px;overflow:hidden}
.continue-bar-fill{height:100%;background:linear-gradient(90deg,var(--gl),var(--go));border-radius:99px}

.verse-card{background:linear-gradient(135deg,var(--sah),var(--sf));border:1px solid var(--sa);border-radius:16px;padding:18px 18px 14px;margin-bottom:18px;position:relative;overflow:hidden;cursor:pointer}
.verse-card::before{content:'۞';position:absolute;top:-10px;right:-10px;font-size:90px;color:var(--sa);opacity:0.08;font-family:serif;line-height:1}
.verse-tag{font-size:9px;color:var(--sa2);letter-spacing:0.16em;font-family:"IRANYekanX",sans-serif;margin-bottom:10px;font-weight:600;position:relative}
.verse-text{font-size:18px;color:var(--tx);line-height:1.9;position:relative}
.verse-text-2{color:var(--mu);text-align:left}
.verse-from{font-size:11px;color:var(--mu);font-family:"IRANYekanX",sans-serif;margin-top:10px;position:relative}

.section-h{font-size:13px;color:var(--mu);font-family:"IRANYekanX",sans-serif;letter-spacing:0.08em;margin:6px 4px 10px;font-weight:600}

.qg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.qc{background:var(--sf);border:1px solid var(--br2);border-radius:14px;padding:16px 14px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;min-height:122px;position:relative;overflow:hidden}
.qc:hover{border-color:var(--go);background:var(--sf2)}
.qc:active{transform:scale(.98)}
.qc-ic{width:36px;height:36px;border-radius:10px;background:var(--gh);display:flex;align-items:center;justify-content:center;color:var(--go);align-self:flex-start;flex-shrink:0}
.qc-ic svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7}
.qc-ic.sa{background:var(--sah);color:var(--sa2)}
.qc-ic.sa svg{stroke:var(--sa2)}
.qc-text-wrap{display:flex;flex-direction:column;gap:4px;margin-top:auto;padding-top:14px}
.qc-title{font-size:16px;color:var(--gd);font-weight:700;line-height:1.2}
.qc-sub{font-size:11.5px;color:var(--mu);letter-spacing:0.02em;line-height:1.35;font-weight:400}
.qc-num{font-size:11.5px;color:var(--sa2);font-weight:600;font-variant-numeric:tabular-nums}

.kw-strip{display:flex;gap:8px;overflow-x:auto;padding:0 0 4px;scrollbar-width:none;margin:0 -14px;padding:0 14px 4px}
.kw-strip::-webkit-scrollbar{display:none}
.kw-strip-card{flex-shrink:0;width:118px;background:var(--sf);border:1px solid var(--br2);border-radius:12px;padding:12px 12px;cursor:pointer;transition:all .15s}
.kw-strip-card:hover{border-color:var(--go)}
.kw-strip-tag{font-size:9px;color:var(--mu);letter-spacing:0.12em;font-family:"IRANYekanX",sans-serif;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.kw-strip-tag::before{content:'✦';color:var(--sa);font-size:10px}
.kw-strip-word{font-size:20px;color:var(--gd);font-weight:700;margin-bottom:3px;line-height:1.1}
.kw-strip-n{font-size:11px;color:var(--mu);font-family:"IRANYekanX",sans-serif;font-variant-numeric:tabular-nums}

/* ─── BROWSE (segmented tabs) ─────────────── */
.seg{display:flex;background:var(--ik);border-radius:11px;padding:3px;gap:2px;margin-bottom:14px}
.seg button{flex:1;background:transparent;border:none;color:var(--mu);font-family:"IRANYekanX",sans-serif;font-size:14px;font-weight:400;padding:7px 0;border-radius:9px;cursor:pointer;transition:all .15s}
.seg button.on{background:var(--go);color:#fff;font-weight:700}

.rh{font-size:12px;color:var(--mu);font-family:"IRANYekanX",sans-serif;margin-bottom:10px;text-align:center;letter-spacing:0.04em}

.ri{background:var(--sf);border:1px solid var(--br2);border-radius:12px;padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.ri:hover{border-color:var(--go);background:var(--sf2)}
.ri:active{transform:scale(.99)}
.ri.tr{border-color:var(--br2)}
.ri.tr:hover{border-color:var(--sa)}
.rt{font-size:10px;color:var(--sa2);font-family:"IRANYekanX",sans-serif;margin-bottom:3px;letter-spacing:0.04em}
.ri.tr .rt{color:var(--sa2)}
.rti{font-size:15px;color:var(--gd);font-weight:700;margin-bottom:3px}
.rp{font-size:14px;color:var(--mu);line-height:1.75}

.zcard{background:var(--sf);border:1px solid var(--br2);border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.zcard:hover{border-color:var(--go);background:var(--sf2)}
.zcard.bakhsh{border-color:var(--sa);background:var(--sah)}
.zcard-title{font-size:15px;color:var(--gd);font-weight:700;line-height:1.3}
.zcard.bakhsh .zcard-title{font-size:16px;color:var(--sa2)}
.zsec{padding:8px 0}
.zsec-title{font-size:20px;color:var(--gd);font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--br2)}
.zsec-body{font-size:15px;line-height:2.1;color:var(--tx);direction:rtl;white-space:pre-wrap}

/* ─── POEM (ghazal/terjee reading) ──────── */
.pm{animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pmeta{text-align:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--br2)}
.pnum{font-size:10px;letter-spacing:0.12em;color:var(--mu);font-family:"IRANYekanX",sans-serif;margin-bottom:3px}
.ptitle{font-size:21px;color:var(--gd);font-weight:700;line-height:1.2}
.psub{font-size:12px;color:var(--mu);margin-top:3px;font-family:"IRANYekanX",sans-serif}

.ghazal-kw-row{display:flex;flex-wrap:wrap;gap:5px;padding:8px 2px 12px;margin-bottom:10px;border-bottom:1px solid var(--br2);align-items:center}
.gkw-lab{font-size:10px;color:var(--mu);font-family:"IRANYekanX",sans-serif;letter-spacing:0.08em;margin-left:3px}
.gkw{background:var(--gh);border:1px solid var(--gl);border-radius:99px;color:var(--gd);font-family:"IRANYekanX",sans-serif;font-size:14px;padding:2px 11px;cursor:pointer;transition:all .15s}
.gkw:hover{background:var(--go);color:#fff;border-color:var(--go)}

.cp{margin-bottom:8px;background:var(--sf);border:1px solid var(--br2);border-radius:12px;overflow:hidden;transition:border-color .15s}
.cp:hover{border-color:var(--br)}
.cp.gbm{border-color:var(--sa);background:var(--sah)}
.cp.tbm{border-color:var(--sa);background:var(--sah)}
.cpb{padding:11px 14px}
.ms{font-size:19px;line-height:1.9;color:var(--tx)}
.ms.s2{border-top:1px solid var(--br2);margin-top:5px;padding-top:5px;color:var(--mu);text-align:left}
.cp.gbm .ms.s2,.cp.tbm .ms.s2{border-top-color:var(--vf)}
mark{background:var(--sa);color:#fff;border-radius:3px;padding:0 3px}
.ca{display:flex;border-top:1px solid var(--br2)}
.cp.gbm .ca,.cp.tbm .ca{border-top-color:var(--vf)}
.ca button{flex:1;background:transparent;border:none;border-left:1px solid var(--br2);padding:7px 0;font-size:15px;cursor:pointer;color:var(--mu)}
.cp.gbm .ca button,.cp.tbm .ca button{border-left-color:var(--vf)}
.ca button:first-child{border-left:none}
.ca button:active{background:var(--ik)}
.ca button.gon{color:var(--sa2)}
.ca button.ton{color:var(--sa2)}
.nd{font-size:13px;color:var(--gd);padding:7px 14px;border-top:1px solid var(--br2);background:var(--gh);line-height:1.6;cursor:pointer}
.cp.gbm .nd,.cp.tbm .nd{border-top-color:var(--vf);background:rgba(200,144,48,0.10)}
.pf{text-align:center;font-size:11px;color:var(--fa);margin-top:8px;font-family:"IRANYekanX",sans-serif;letter-spacing:0.06em}

/* ─── KEYWORDS ─────────────────────────────── */
.kw-filters{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;scrollbar-width:none;margin:0 -14px;padding:0 14px 12px}
.kw-filters::-webkit-scrollbar{display:none}
.kw-chip{flex:0 0 auto;padding:6px 14px;border-radius:99px;border:1px solid var(--br);background:transparent;color:var(--mu);font-family:"IRANYekanX",sans-serif;font-size:14px;cursor:pointer;white-space:nowrap;transition:all .15s}
.kw-chip:hover{border-color:var(--go);color:var(--gd)}
.kw-chip.on{background:var(--go);border-color:var(--go);color:#fff;font-weight:700}
.kw-count-hint{font-size:11px;color:var(--fa);text-align:center;margin-bottom:10px;font-family:"IRANYekanX",sans-serif;letter-spacing:0.04em}
.kw-card{background:var(--sf);border:1px solid var(--br2);border-radius:12px;padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:all .15s}
.kw-card:hover{border-color:var(--go);background:var(--sf2)}
.kw-card-tag{font-size:10px;color:var(--mu);font-family:"IRANYekanX",sans-serif;margin-bottom:4px;letter-spacing:0.04em;display:flex;align-items:center;gap:5px}
.kw-card-tag::before{content:'✦';color:var(--sa);font-size:11px}
.kw-card-title{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:4px}
.kw-card-word{font-size:18px;color:var(--gd);font-weight:700;line-height:1.2}
.kw-card-count{font-size:13px;color:var(--sa2);font-variant-numeric:tabular-nums;font-family:"IRANYekanX",sans-serif;flex-shrink:0}
.kw-card-preview{font-size:12px;color:var(--mu);line-height:1.75;font-family:"IRANYekanX",sans-serif;display:flex;align-items:center;gap:6px}
.kw-card-preview .sep{color:var(--vf)}
.kw-card-bar{flex:0 1 60px;height:3px;background:var(--ik);border-radius:99px;overflow:hidden;position:relative}
.kw-card-bar-fill{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--gl),var(--go));border-radius:99px}

/* Keyword detail */
.kw-detail{padding-top:2px}
.kw-d-head{text-align:center;padding:12px 0 18px;border-bottom:1px solid var(--br2);margin-bottom:16px}
.kw-d-word{font-size:46px;color:var(--gd);font-weight:700;line-height:1;margin-bottom:8px}
.kw-d-cat{font-size:12px;color:var(--mu);font-family:"IRANYekanX",sans-serif;letter-spacing:0.04em}
.kw-d-section{margin-bottom:18px}
.kw-d-section h4{font-size:11px;color:var(--sa2);font-family:"IRANYekanX",sans-serif;letter-spacing:0.12em;margin-bottom:7px;font-weight:600;display:flex;align-items:center;gap:6px}
.kw-d-section h4::before{content:'';display:inline-block;width:16px;height:1px;background:var(--sa)}
.kw-d-meaning{font-size:16px;color:var(--tx);line-height:1.95;text-align:justify;text-justify:inter-word}
.kw-d-tags{display:flex;flex-wrap:wrap;gap:6px}
.kw-d-tag{background:var(--sf);border:1px solid var(--br2);border-radius:10px;padding:8px 12px;font-size:13px;color:var(--tx);font-family:"IRANYekanX",sans-serif;line-height:1.5;display:flex;flex-direction:column;gap:2px;flex:1;min-width:30%}
.kw-d-tag-label{font-size:9px;color:var(--mu);letter-spacing:0.08em;font-family:"IRANYekanX",sans-serif}
.kw-d-tag-val{color:var(--gd);font-weight:700}
.kw-d-tag-val.empty{color:var(--vf);font-weight:400}
.kw-d-stats{display:flex;background:var(--sf);border:1px solid var(--br2);border-radius:12px;padding:12px}
.kw-d-stat{flex:1;text-align:center;border-left:1px solid var(--br2);padding:0 4px}
.kw-d-stat:first-child{border-left:none}
.kw-d-stat-val{font-size:22px;color:var(--go);font-weight:700;font-variant-numeric:tabular-nums;font-family:"IRANYekanX",sans-serif;line-height:1.1}
.kw-d-stat-lab{font-size:10px;color:var(--mu);margin-top:4px;font-family:"IRANYekanX",sans-serif}
.kw-d-poems-head{font-size:13px;color:var(--mu);font-family:"IRANYekanX",sans-serif;margin:6px 0 10px;text-align:center;padding-bottom:8px;border-bottom:1px solid var(--br2)}
.kw-d-poems-head b{color:var(--gd);font-weight:700;font-variant-numeric:tabular-nums}

/* ─── SEARCH SCREEN ──────────────────────── */
.search-screen{padding:6px 4px}
.search-input-wrap{background:var(--sf);border:1px solid var(--br);border-radius:14px;display:flex;align-items:center;padding:0 14px;margin-bottom:14px;transition:border-color .15s}
.search-input-wrap:focus-within{border-color:var(--go);background:var(--sf2)}
.search-icon{color:var(--mu);font-size:18px;margin-left:8px}
.search-input-wrap input{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-family:"IRANYekanX",sans-serif;font-size:18px;padding:14px 0;text-align:right}
.search-input-wrap input::placeholder{color:var(--vf);font-size:15px}
.search-input-wrap input::-webkit-search-cancel-button{-webkit-appearance:none}
.search-hints{margin-bottom:8px;padding:8px 4px 12px;border-bottom:1px dashed var(--br2)}
.search-hint{font-size:13px;color:var(--mu);font-family:"IRANYekanX",sans-serif;line-height:1.9}
.search-hint b{color:var(--gd);font-family:"IRANYekanX",sans-serif;font-weight:700;font-size:14px}
.search-suggest-h{font-size:12px;color:var(--mu);font-family:"IRANYekanX",sans-serif;letter-spacing:0.06em;margin:4px 4px 8px;font-weight:600}
.search-suggest{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.search-suggest .gkw{font-size:13px;padding:4px 12px}

.ri.kw .rt::before{content:'✦ ';color:var(--sa)}

/* ─── BOOKMARKS ─────────────────────────── */

.bi.gbx{border-color:var(--sa);background:var(--sah)}
.bi.tbx{border-color:var(--sa);background:var(--sah)}
.bpt{font-size:11px;color:var(--sa2);margin-bottom:4px;font-weight:700;font-family:"IRANYekanX",sans-serif;letter-spacing:0.04em}
.bm2{font-size:16px;color:var(--tx);line-height:1.85}

.bnt{font-size:13px;color:var(--gd);margin-top:6px;padding-top:6px;border-top:1px solid var(--vf);line-height:1.6}

/* empty / messages */

.er{text-align:center;padding:24px;color:var(--er);font-size:14px;line-height:2;font-family:"IRANYekanX",sans-serif}

/* ─── BOOK LOADER ────────────────────────── */
.book-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;gap:16px}
.book-loader{position:relative;width:60px;height:46px;perspective:480px;flex-shrink:0}
.book-loader::before{content:'';position:absolute;inset:0;background:var(--sf2);border:1.5px solid var(--gd);border-radius:3px 5px 5px 3px;box-shadow:0 2px 6px rgba(58,72,48,0.12),inset 0 0 0 1px var(--sf)}
.book-loader::after{content:'';position:absolute;left:50%;top:2px;bottom:2px;width:1px;background:var(--gd);transform:translateX(-0.5px);z-index:2}
.book-loader span{position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);background:var(--sf);transform-origin:right center;animation:bookFlip 2.1s infinite ease-in-out;backface-visibility:hidden;border-radius:1px 0 0 1px;box-shadow:-1px 0 2px rgba(58,72,48,0.06)}
.book-loader span::before{content:'';position:absolute;top:7px;right:4px;left:5px;border-top:1px solid var(--br2)}
.book-loader span::after{content:'';position:absolute;top:13px;right:4px;left:5px;border-top:1px solid var(--br2);box-shadow:0 6px 0 -0.5px var(--br2),0 12px 0 -0.5px var(--br2)}
.book-loader span:nth-child(1){animation-delay:-0s;z-index:5}
.book-loader span:nth-child(2){animation-delay:-0.5s;z-index:4}
.book-loader span:nth-child(3){animation-delay:-1.0s;z-index:3}
@keyframes bookFlip{
  0%, 30%{transform:rotateY(0deg)}
  60%, 100%{transform:rotateY(-180deg)}
}
.book-loading-msg{font-size:12.5px;color:var(--mu);letter-spacing:0.06em;font-family:"IRANYekanX",sans-serif;animation:loadingFade 1.4s infinite ease-in-out}
@keyframes loadingFade{
  0%,100%{opacity:0.55}
  50%{opacity:1}
}

/* ─── NOTE MODAL ─────────────────────────── */
.mbg{position:fixed;inset:0;background:rgba(26,34,24,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
.mbg.open{opacity:1;pointer-events:all}
.mo{background:var(--sf);border-radius:18px 18px 0 0;border-top:1px solid var(--br);width:100%;max-width:500px;padding:16px 16px 28px;transform:translateY(100%);transition:transform .25s}
.mbg.open .mo{transform:translateY(0)}
.mt2{font-size:12px;color:var(--mu);font-family:"IRANYekanX",sans-serif;margin-bottom:10px;text-align:center;letter-spacing:0.04em}
.mv{font-size:18px;color:var(--gd);line-height:1.9;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--br2);text-align:center}

.mta:focus{border-color:var(--go)}
.mbs{display:flex;gap:8px;margin-top:12px}
.mbs button{flex:1;padding:11px;border-radius:11px;border:1px solid var(--br);font-family:"IRANYekanX",sans-serif;font-size:15px;cursor:pointer;font-weight:700}
.msv{background:var(--go);color:#fff;border-color:var(--go)}
.msv:active{background:var(--gd)}
.mcl{background:transparent;color:var(--mu)}

/* ─── AUTH MODAL ─────────────────────────── */
.auth-bg{position:fixed;inset:0;background:rgba(26,34,24,0.55);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px)}

.auth-submit:active{background:var(--gd)}
.auth-err{color:var(--er);font-size:13px;min-height:18px;text-align:center;font-family:"IRANYekanX",sans-serif}

.hd-icon.with-avatar{position:relative}

.pr-guest-msg{font-size:14px;color:var(--mu);line-height:1.9;margin-top:6px;padding:0 8px;position:relative}

.pr-stats{display:flex;background:var(--sf);border:1px solid var(--br2);border-radius:14px;padding:14px 6px;margin-bottom:14px}
.pr-stat{flex:1;text-align:center;border-left:1px solid var(--br2);padding:0 4px}
.pr-stat:first-child{border-left:none}

.pr-stat-lab{font-size:11px;color:var(--mu);margin-top:4px;font-family:"IRANYekanX",sans-serif;letter-spacing:0.04em}

.pr-section{margin-bottom:16px}
.pr-section-h{font-size:11px;color:var(--mu);font-family:"IRANYekanX",sans-serif;letter-spacing:0.12em;margin:0 4px 8px;font-weight:600;text-transform:uppercase}
.pr-list{background:var(--sf);border:1px solid var(--br2);border-radius:14px;overflow:hidden}
.pr-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--br2);transition:background .15s;background:transparent;width:100%;border-left:none;border-right:none;border-top:none;font-family:"IRANYekanX",sans-serif;text-align:right}
.pr-row:last-child{border-bottom:none}
.pr-row:hover{background:var(--sf2)}
.pr-row:active{background:var(--ik)}
.pr-row-ic{width:32px;height:32px;border-radius:9px;background:var(--gh);color:var(--go);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.pr-row-ic.sa{background:var(--sah);color:var(--sa2)}
.pr-row-ic.er{background:#f4dcd4;color:var(--er)}
.pr-row-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.pr-row-t1{font-size:15px;color:var(--gd);font-weight:700;line-height:1.2;display:block}
.pr-row-t2{font-size:11px;color:var(--mu);font-family:"IRANYekanX",sans-serif;display:block}
.pr-row-chev{color:var(--vf);font-size:18px;line-height:1}

.pr-edit-form{background:var(--sf);border:1px solid var(--br2);border-radius:14px;padding:14px 14px 12px;margin-bottom:14px}

.pr-edit-inp{width:100%;background:var(--bg);border:1px solid var(--br);border-radius:11px;padding:11px 14px;color:var(--tx);font-family:"IRANYekanX",sans-serif;font-size:15px;outline:none;direction:ltr;transition:border-color .15s}
.pr-edit-inp:focus{border-color:var(--go);background:var(--sf2)}
.pr-edit-inp[dir="rtl"]{direction:rtl;font-family:"IRANYekanX",sans-serif;font-size:16px}
.pr-edit-bts{display:flex;gap:8px;margin-top:4px}
.pr-edit-bts button{flex:1;padding:11px;border-radius:11px;border:1px solid var(--br);font-family:"IRANYekanX",sans-serif;font-size:15px;cursor:pointer;font-weight:700}
.pr-edit-save{background:var(--go);color:#fff;border-color:var(--go)}
.pr-edit-save:active{background:var(--gd)}
.pr-edit-cancel{background:transparent;color:var(--mu)}
.pr-edit-msg{font-size:12px;text-align:center;padding:8px 0 4px;font-family:"IRANYekanX",sans-serif;min-height:24px}
.pr-edit-msg.ok{color:var(--go)}
.pr-edit-msg.er{color:var(--er)}

.pr-guest-bts{display:flex;gap:8px;margin-bottom:14px}
.pr-guest-bts button{flex:1;padding:13px;border-radius:12px;font-family:"IRANYekanX",sans-serif;font-size:16px;cursor:pointer;font-weight:700;border:1px solid var(--br)}
.pr-guest-bts .pr-login{background:var(--go);color:#fff;border-color:var(--go)}
.pr-guest-bts .pr-login:active{background:var(--gd)}
.pr-guest-bts .pr-reg{background:transparent;color:var(--gd)}
.pr-guest-bts .pr-reg:active{background:var(--ik)}

.pr-foot{text-align:center;font-size:11px;color:var(--fa);font-family:"IRANYekanX",sans-serif;letter-spacing:0.06em;padding:14px 0 4px}

/* logout confirm */
.cf-bg{position:fixed;inset:0;background:rgba(26,34,24,0.5);display:flex;align-items:center;justify-content:center;z-index:150;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
.cf-bg.open{opacity:1;pointer-events:all}
.cf-box{background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:20px 18px;width:min(320px,90vw);text-align:center}

.cf-sub{font-size:13px;color:var(--mu);font-family:"IRANYekanX",sans-serif;line-height:1.7;margin-bottom:16px}
.cf-bts{display:flex;gap:8px}
.cf-bts button{flex:1;padding:11px;border-radius:11px;font-family:"IRANYekanX",sans-serif;font-size:15px;cursor:pointer;font-weight:700;border:1px solid var(--br)}
.cf-cancel{background:transparent;color:var(--mu)}
.cf-confirm{background:var(--er);color:#fff;border-color:var(--er)}

/* auth modal close button */
.auth-close{position:absolute;top:12px;left:14px;background:transparent;border:none;color:var(--mu);font-size:20px;cursor:pointer;line-height:1;padding:4px 6px}
.auth-close:hover{color:var(--gd)}
.auth-modal{position:relative}

/* ─── TWEAKS PANEL ───────────────────────── */
.tw-panel{position:fixed;bottom:80px;right:14px;background:var(--sf);border:1px solid var(--go);border-radius:14px;padding:14px 16px;width:min(300px,calc(100vw - 28px));z-index:300;box-shadow:0 10px 30px rgba(58,72,48,0.2);display:none;font-family:"IRANYekanX",sans-serif}

</style>
</head>
<body>

<div class="app">

<script>
(async function(){
const TOT=2827, TB=34;
let cg=0, ct=0;
let curTab='home';      // active bottom-nav tab
let curView='home';     // active "screen" — home/browse/kw/bm/srch/gh/tr/zsec/kwd
let browseSub='g';      // browse segmented sub: g/t/z
let mkey=null;
let _poemCache={}, _listCache={};
let _kwFilter='all', _curKw=null;
let _bms={}, _nts={};

const API_URL = window.location.protocol === 'file:' || window.location.hostname === 'localhost'
  ? 'http://localhost:8000'
  : 'https://' + window.location.hostname + '/api';

let MOCK_MODE = false;
const MOCK_TITLES = ['مفروز هر هوس','بهانه دل','شب خاموش','کاسه گدا','قطره و دریا','بی‌نشان','تماشاگاه','عالم رنگ','صحرای حیرت','خموشی سر'];
function _mockGhazal(n){
  const pool = _allKeywords.length ? _allKeywords : [];
  let kws = [];
  for(let i=0;i<4 && pool.length;i++){
    const k = pool[(n*7 + i*13) % pool.length];
    if(k && !kws.includes(k.word)) kws.push(k.word);
  }
  const couplets = [
    [`در این ${kws[0]||'دل'} که ز ما رفته است، نشانی نیست`, `هر چه جستیم در این ${kws[1]||'آینه'}، صورت ما بود`],
    [`${kws[2]||'گل'} از تماشای رخت دامن کشید`, `بلبل از شرم زبان در کام برد`],
    [`${kws[0]||'دل'} ما با غم تو خو گرفته است`, `در این ویرانه ${kws[3]||'کاشانه'} دارد`],
    [`بیدل، نه ${kws[1]||'جان'} داریم و نه جانان، چه کنیم`, `در میکده‌ای که ساغر و می هر دو شکستند`],
    [`${kws[2]||'شب'} تار است و دل پُر شور و چشم خواب‌آلود`, `کجا چراغی که این راه را روشن کند`],
  ];
  return {
    number:n,
    title: MOCK_TITLES[n%MOCK_TITLES.length],
    couplets,
    keywords: kws.map((w,i)=>({id:i+1, word:w})),
  };
}
async function apiFetch(url){
  if(MOCK_MODE) return _mockResolve(url);
  try{
    const r = await fetch(url);
    if(!r.ok) throw new Error('bad');
    return await r.json();
  }catch(e){ MOCK_MODE = true; return _mockResolve(url); }
}
function _mockResolve(url){
  let m = url.match(/poems\/ghazal\/(\d+)/);
  if(m) return _mockGhazal(parseInt(m[1]));
  if(url.match(/poems\/ghazal\/random/)) return _mockGhazal(Math.floor(Math.random()*TOT)+1);
  m = url.match(/poems\/terjee\/(\d+)/);
  if(m){ const n=parseInt(m[1]); return {number:n, couplets:_mockGhazal(n).couplets}; }
  if(url.match(/poems\/ghazals$/)){
    return Array.from({length:60}, (_,i)=>({number:i+1, title:MOCK_TITLES[i%MOCK_TITLES.length], first_couplet:_mockGhazal(i+1).couplets[0]}));
  }
  if(url.match(/poems\/terjees$/)){
    return Array.from({length:TB}, (_,i)=>({number:i+1, first_couplet:_mockGhazal(i+1).couplets[0]}));
  }
  if(url.match(/poems\/zand$/)){
    return [
      {number:1, title:'پیشگفتار', type:'bakhsh', has_content:true},
      {number:2, title:'فصل یکم — حیرت', type:'fasl', has_content:true},
      {number:3, title:'فصل دوم — آینه', type:'fasl', has_content:true},
    ];
  }
  m = url.match(/poems\/zand\/(\d+)/);
  if(m) return {title:'بخشی از زند بیدل', content:'این بخش در حالت پیش‌نمایش در دسترس نیست. در حالت اصلی، متن کامل شرح شروین وکیلی از API بارگیری می‌شود.\n\nمتن این فصل شامل تحلیل‌های فلسفی و عرفانی شروین وکیلی بر روی غزلیات بیدل است که نشان می‌دهد چگونه استعاره‌های شعری بیدل دلالت‌های فلسفی-معرفت‌شناختی دارند.'};
  if(url.match(/poems\/search/)){
    const kw = decodeURIComponent(url.split('q=')[1].split('&')[0]);
    return {results: Array.from({length:5},(_,i)=>{
      const n = (i+1)*43 % TOT + 1;
      return {number:n, title:MOCK_TITLES[n%MOCK_TITLES.length], matches:[{couplet:_mockGhazal(n).couplets[i%5]}]};
    })};
  }
  return null;
}

async function loadUserData(){
  _loadCachedUser();
  updateProfileBadge();
  refreshNav();
  const token=getToken();
  if(!token){
    // Guest mode — try API once silently to see if we should go to mock
    try{
      const r = await fetch(API_URL+'/poems/ghazal/1');
      if(!r.ok) throw new Error();
    }catch(e){
      MOCK_MODE = true;
    }
    return;
  }
  const [rb,rn]=await Promise.all([
    fetch(API_URL+'/bookmarks',{headers:{'Authorization':'Bearer '+token}}),
    fetch(API_URL+'/notes',{headers:{'Authorization':'Bearer '+token}})
  ]);
  if(rb.status===401||rn.status===401){setToken(null);_saveUser(null);return;}
  const bmsArr=await rb.json(), ntsArr=await rn.json();
  const _toFetch={};
  for(const b of bmsArr) _toFetch[b.poem_type+'_'+b.poem_id]=b;
  await Promise.all(Object.values(_toFetch).map(async b=>{
    const ep=b.poem_type==='g'?'/poems/ghazal/':'/poems/terjee/';
    const r=await fetch(API_URL+ep+b.poem_id);
    if(r.ok) _poemCache[b.poem_type+'_'+b.poem_id]=await r.json();
  }));
  _bms={};
  for(const b of bmsArr){
    const key=bkey(b.poem_type,b.poem_id,b.couplet_index);
    const poem=_poemCache[b.poem_type+'_'+b.poem_id];
    const c=poem?(poem.couplets[b.couplet_index]||['','']):['',''];
    const ti2=b.poem_type==='g'?(poem?.title||''):'بند '+b.poem_id;
    _bms[key]={tp:b.poem_type,id:b.poem_id,ci:b.couplet_index,ti2,c};
  }
  _nts={};
  for(const n of ntsArr){
    _nts[bkey(n.poem_type,n.poem_id,n.couplet_index)]=n.text;
  }
  updateBmBadge();
}
function bkey(tp,id,ci){return tp+'_'+id+'_'+ci}

// ─── HIGHLIGHT ───────────────────────────
function hl(txt,kw){
  if(!kw||!txt) return txt||'';
  var out='',i=0,kl=kw.length;
  while(i<txt.length){
    var j=txt.indexOf(kw,i);
    if(j===-1){out+=txt.slice(i);break;}
    out+=txt.slice(i,j)+'<mark>'+kw+'</mark>';
    i=j+kl;
  }
  return out;
}

function resolveGhazalKeywords(n, poem){
  if(poem && poem.keywords && poem.keywords.length) return poem.keywords.map(k=>k.word||k.w);
  if(!poem) return [];
  const text = poem.couplets.map(c=>c.join(' ')).join(' ');
  const found = [];
  for(const k of _allKeywords){
    if(text.indexOf(k.word)!==-1){ found.push(k); }
  }
  found.sort((a,b)=>b.count-a.count);
  return found.slice(0,5).map(k=>k.word);
}
function kwBy(word){ return _allKeywords.find(k=>k.word===word); }
function getCategoryLabel(cat){
  if(!cat || cat==='سایر') return 'سایر';
  return cat;
}
function getCategories(){
  const cats = [...new Set(_allKeywords.map(k=>k.category).filter(c=>c))];
  return [{id:'all', label:'همه'}, ...cats.filter(c=>c!=='سایر').map(c=>({id:c, label:c})), {id:'سایر', label:'سایر'}];
}

// ─── COUPLET RENDERING ───────────────────
function mkCp(m1,m2,key,isBm,note,type,kw){
  const cls = isBm?(type==='g'?' gbm':' tbm'):'';
  let h='<div class="cp'+cls+'" data-key="'+key+'">';
  h+='<div class="cpb"><div class="ms">'+hl(m1,kw)+'</div>';
  if(m2) h+='<div class="ms s2">'+hl(m2,kw)+'</div>';
  h+='</div>';
  if(note) h+='<div class="nd" data-action="note" data-key="'+key+'">📝 '+note+'</div>';
  h+='<div class="ca">';
  h+='<button data-action="bm" class="'+(isBm?(type==='g'?'gon':'ton'):'')+'">'+(isBm?'★':'☆')+'</button>';
  h+='<button data-action="note">📝</button>';
  h+='<button data-action="copy">📋</button>';
  h+='</div></div>';
  return h;
}

function renderKeywordList(){
  const all = _allKeywords.slice();
  let list = _kwFilter==='all' ? all : all.filter(k=>k.category===_kwFilter);
  if(TWEAKS.sortBy==='alpha') list.sort((a,b)=>(a.word||'').localeCompare(b.word||'','fa'));
  else list.sort((a,b)=>(b.count||0)-(a.count||0));
  const maxN = Math.max(...all.map(k=>k.count||0), 1);
  setHeader('واژه‌نامه بیدل', toFa(list.length)+' واژه از ۲۲۲');
  const cats = getCategories();
  let h = '<div class="kw-filters">';
  for(const c of cats){
    h += '<button class="kw-chip'+(_kwFilter===c.id?' on':'')+'" data-kwfilter="'+c.id+'">'+c.label+'</button>';
  }
  h += '</div>';
  h += '<div class="kw-count-hint fa">'+toFa(list.length)+' واژه · ' + (TWEAKS.sortBy==='alpha'?'الفبایی':'بر اساس تکرار') + '</div>';
  if(!list.length){
    h += '<div class="nr2">در این دسته واژه‌ای نیست</div>';
  } else {
    for(const k of list){
      const word = k.word||'';
      const cnt = k.count||0;
      const pct = k.percentage||0;
      const cat = k.category||'سایر';
      const w = Math.round((cnt/maxN)*100);
      h += '<div class="kw-card '+(TWEAKS.cardStyle==='compact'?'compact':'')+'" data-kwword="'+word+'">';
      h += '<div class="kw-card-tag fa">واژه · '+getCategoryLabel(cat)+'</div>';
      h += '<div class="kw-card-title"><span class="kw-card-word">'+word+'</span><span class="kw-card-count fa">'+toFa(cnt)+' بار</span></div>';
      if(TWEAKS.cardStyle!=='compact'){
        h += '<div class="kw-card-preview">'+toFa(Number(pct).toFixed(2))+'٪<span class="sep">·</span><span class="kw-card-bar"><span class="kw-card-bar-fill" style="width:'+w+'%"></span></span><span class="sep">·</span>'+toFa(Math.round(cnt/4.27))+' غزل</div>';
      }
      h += '</div>';
    }
  }
  ctEl.innerHTML=h; ctEl.scrollTop=0;
}

async function toggleBm(tp,id,ci){
  if(!isAuthed()){ showAuthModal({type:'bm',tp,id,ci}); return; }
  if(MOCK_MODE){
    const key=bkey(tp,id,ci);
    if(_bms[key]){ delete _bms[key]; }
    else{
      const poem=_poemCache[tp+'_'+id];
      const c=poem?(poem.couplets[ci]||['','']):['',''];
      const ti2=tp==='g'?(poem?.title||''):'بند '+id;
      _bms[key]={tp,id,ci,ti2,c};
    }
    _saveMockBms();
    updateBmBadge();
    if(tp==='g') showG(cg); else showT(ct);
    return;
  }
  const resp=await fetch(API_URL+'/bookmarks',{method:'POST',headers:authHeaders(),body:JSON.stringify({poem_type:tp,poem_id:id,couplet_index:ci})});
  if(resp.status===401){setToken(null);_saveUser(null);showAuthModal({type:'bm',tp,id,ci});return;}
  await loadUserData();
  if(tp==='g') showG(cg); else showT(ct);
}

async function doSrch(){
  const inp = document.getElementById('srch-input');
  const raw = inp ? inp.value.trim() : ''; if(!raw) return;
  const resultsEl = document.getElementById('srch-results');
  if(!resultsEl) return;
  resultsEl.innerHTML = '<div class="nr2">در حال جستجو…</div>';

  const persianMap={'۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
  const normalized=raw.trim().replace(/[۰-۹]/g,d=>persianMap[d]);
  const num=parseInt(normalized);
  if(!isNaN(num) && num>0 && String(num)===normalized){
    if(num>=1 && num<=TOT){ showG(num); return; }
    if(num>=1 && num<=TB){ showT(num); return; }
    resultsEl.innerHTML='<div class="nr2">شماره '+toFa(num)+' یافت نشد</div>';
    return;
  }

  const kw=raw;
  const allKw = _allKeywords;
  const exactKw = allKw.filter(k=>k.word===kw);
  const partialKw = allKw.filter(k=>k.word!==kw && (k.word.indexOf(kw)!==-1 || kw.indexOf(k.word)!==-1));
  const kwMatches = [...exactKw, ...partialKw].slice(0,3);
  const [rg,rt]=await Promise.all([
    apiFetch(API_URL+'/poems/search?q='+encodeURIComponent(kw)+'&type=g'),
    apiFetch(API_URL+'/poems/search?q='+encodeURIComponent(kw)+'&type=t'),
  ]);
  const rgX = rg||{results:[]}, rtX = rt||{results:[]};
  const ms=[];
  for(const r of (rgX.results||[])){
    const c=r.matches[0]?.couplet||['',''];
    ms.push({tp:'g',n:r.number,ti2:r.title,pv:c[0]+(c[1]?' / '+c[1]:'')});
  }
  for(const r of (rtX.results||[])){
    const c=r.matches[0]?.couplet||['',''];
    ms.push({tp:'t',n:r.number,ti2:'بند '+toFa(r.number),pv:c[0]+(c[1]?' / '+c[1]:'')});
  }
  if(!ms.length && !kwMatches.length){resultsEl.innerHTML='<div class="nr2">«'+kw+'» یافت نشد</div>';return}
  let h='<div class="rh fa">'+toFa(ms.length)+' نتیجه برای «'+kw+'»'+(kwMatches.length?' · '+toFa(kwMatches.length)+' واژه':'')+'</div>';
  for(const k of kwMatches){
    const numGh = Math.round((k.count||0)/4.27);
    const meanShort = (k.meaning||'').length>70 ? (k.meaning||'').slice(0,70)+'…' : (k.meaning||'');
    h += '<div class="ri kw" data-kwword="'+(k.word||'')+'">';
    h += '<div class="rt fa">واژه · '+getCategoryLabel(k.category||'سایر')+'</div>';
    h += '<div class="rti-row"><span class="rti">'+hl(k.word||'',kw)+'</span><span class="rti-count fa">'+toFa(k.count||0)+' بار · '+toFa(numGh)+' غزل</span></div>';
    h += '<div class="rp">'+meanShort+'</div></div>';
  }
  for(const m of ms){
    h+='<div class="ri'+(m.tp==='t'?' tr':'')+'" data-tp="'+m.tp+'" data-n="'+m.n+'" data-kw="'+kw+'">';
    if(m.tp==='t') h+='<div class="rt fa">ترجیع‌بند</div>';
    h+='<div class="rti">'+m.ti2+'</div><div class="rp">'+hl(m.pv,kw)+'</div></div>';
  }
  resultsEl.innerHTML = h;
}

// ─── EVENT DELEGATION ────────────────────
ctEl.addEventListener('click', function(e){
  // Profile rows
  const pr = e.target.closest('.pr-row');
  if(pr){
    const act = pr.dataset.pract;
    if(act==='edit'){ _editingProfile=true; renderProfileLoggedIn(); setTimeout(()=>{const el=document.getElementById('pr-inp-name');if(el)el.focus();},50); return; }
    if(act==='bms'){ showBm(); return; }
    if(act==='logout'){ showConfirm(); return; }
    if(act==='go-browse'){ showBrowse('g'); return; }
    if(act==='go-kw'){ showKeywords(); return; }
    if(act==='go-search'){ showSearch(); return; }
    return;
  }
  // Profile edit save/cancel
  if(e.target.closest('#pr-save-edit')){ saveProfileEdit(); return; }
  if(e.target.closest('#pr-cancel-edit')){ _editingProfile=false; showProfile(); return; }
  // Profile guest buttons
  if(e.target.closest('#pr-guest-login')){ switchAuthTab('login'); showAuthModal(); return; }
  if(e.target.closest('#pr-guest-reg')){ switchAuthTab('register'); showAuthModal(); return; }

  // Home quick cards
  const qc = e.target.closest('.qc');
  if(qc){
    const dest = qc.dataset.go;
    if(dest==='browse-g'){ browseSub='g'; showBrowse('g'); }
    else if(dest==='browse-t'){ browseSub='t'; showBrowse('t'); }
    else if(dest==='browse-z'){ browseSub='z'; showBrowse('z'); }
    else if(dest==='kw'){ showKeywords(); }
    return;
  }
  // Verse of day → open ghazal
  const vod = e.target.closest('#verse-of-day');
  if(vod){ showG(parseInt(vod.dataset.n)); return; }
  // Home search bar → open search
  const hs = e.target.closest('#home-search');
  if(hs){ showSearch(); return; }
  // Top keyword strip
  const ksc = e.target.closest('.kw-strip-card');
  if(ksc){ showKeyword(ksc.dataset.kwword); return; }
  // Browse segmented
  const segb = e.target.closest('#browse-seg button');
  if(segb){
    browseSub = segb.dataset.sub;
    document.querySelectorAll('#browse-seg button').forEach(b=>b.classList.toggle('on', b===segb));
    setHeader('غزلیات بیدل', browseSub==='g'?'۲۸۲۷ غزل':browseSub==='t'?'۳۴ بند · ترجیع‌بند':'شرح شروین وکیلی');
    renderBrowseBody();
    return;
  }
  // Keyword filter chip
  const fc = e.target.closest('.kw-chip');
  if(fc){ _kwFilter = fc.dataset.kwfilter; renderKeywordList(); return; }
  // Keyword card
  const kc = e.target.closest('.kw-card');
  if(kc){ showKeyword(kc.dataset.kwword); return; }
  // Tag inside ghazal/search
  const gtag = e.target.closest('.gkw');
  if(gtag){ showKeyword(gtag.dataset.kwword); return; }
  // Keyword inside search results
  const kwr = e.target.closest('.ri.kw');
  if(kwr){ showKeyword(kwr.dataset.kwword); return; }
  // Zand section
  const zc = e.target.closest('.zcard');
  if(zc){ showZand(parseInt(zc.dataset.zid)); return; }
  // Result item
  const ri = e.target.closest('.ri');
  if(ri && !e.target.closest('button')){
    const kw=ri.dataset.kw||'';
    if(ri.dataset.tp==='g'){ showG(parseInt(ri.dataset.n),kw); }
    else if(ri.dataset.tp==='t'){ showT(parseInt(ri.dataset.n),kw); }
    return;
  }
  // Bookmark item
  const bi = e.target.closest('.bi');
  if(bi && !e.target.closest('button')){
    if(bi.dataset.tp==='g'){ showG(parseInt(bi.dataset.id)); }
    else{ showT(parseInt(bi.dataset.id)); }
    return;
  }
  // Delete bookmark
  if(e.target.closest('.bdl')){
    const k=e.target.closest('.bdl').dataset.key;
    const p2=k.split('_');
    toggleBm(p2[0],parseInt(p2[1]),parseInt(p2[2]));
    return;
  }
  // Couplet buttons
  const btn=e.target.closest('.ca button');
  const cp=e.target.closest('.cp');
  const nd=e.target.closest('.nd');
  if(!cp) return;
  const key=cp.dataset.key;
  const parts=key.split('_');
  const tp=parts[0], id=parseInt(parts[1]), ci=parseInt(parts[2]);
  if(nd && !btn){ openModal(key, getVerse(tp,id,ci)); return; }
  if(!btn) return;
  const action=btn.dataset.action;
  if(action==='bm'){ toggleBm(tp,id,ci); return; }
  if(action==='note'){ openModal(key, getVerse(tp,id,ci)); return; }
  if(action==='copy'){
    const [m1,m2]=getCouplet(tp,id,ci);
    const txt=m1+(m2?'\n'+m2:'');
    const el=document.createElement('div');
    el.contentEditable=true;
    el.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;overflow:hidden;opacity:0.01;white-space:pre;';
    el.innerText=txt; document.body.appendChild(el);
    const sel=window.getSelection(), range=document.createRange();
    range.selectNodeContents(el); sel.removeAllRanges(); sel.addRange(range);
    try{document.execCommand('copy');}catch(e){}
    sel.removeAllRanges(); document.body.removeChild(el);
    const o=btn.textContent; btn.textContent='✓'; setTimeout(()=>btn.textContent=o,1000);
  }
});

function getVerse(tp,id,ci){
  const [m1,m2]=getCouplet(tp,id,ci);
  return m1+(m2?' / '+m2:'');
}
function getCouplet(tp,id,ci){
  const poem=_poemCache[tp+'_'+id];
  return poem?(poem.couplets[ci]||['','']):['',''];
}

// ─── NOTE MODAL ──────────────────────────
function openModal(key,verse){
  mkey=key;
  document.getElementById('mv').textContent=verse;
  document.getElementById('mn').value=_nts[key]||'';
  mbg.classList.add('open');
  setTimeout(()=>document.getElementById('mn').focus(),300);
}
function cmob(){mbg.classList.remove('open');mkey=null}
async function svn(){
  const v=document.getElementById('mn').value.trim();
  const parts=mkey.split('_');
  const tp=parts[0],pid=parseInt(parts[1]),ci=parseInt(parts[2]);
  if(!isAuthed()){ showAuthModal({type:'note',tp,id:pid,ci,text:v}); return; }
  if(MOCK_MODE){
    if(v) _nts[bkey(tp,pid,ci)] = v;
    else delete _nts[bkey(tp,pid,ci)];
    _saveMockBms();
    cmob();
    if(curView==='gh') showG(cg);
    else if(curView==='tr') showT(ct);
    else if(curView==='bm') showBm();
    return;
  }
  const token=getToken();
  if(!token){showAuthModal({type:'note',tp,id:pid,ci,text:v});return;}
  if(v){
    await fetch(API_URL+'/notes',{method:'POST',headers:authHeaders(),body:JSON.stringify({poem_type:tp,poem_id:pid,couplet_index:ci,text:v})});
  } else {
    await fetch(API_URL+'/notes/'+tp+'/'+pid+'/'+ci,{method:'DELETE',headers:authHeaders()});
  }
  await loadUserData();
  cmob();
  if(curView==='gh') showG(cg);
  else if(curView==='tr') showT(ct);
  else if(curView==='bm') showBm();
}
document.getElementById('btn-mcancel').addEventListener('click', cmob);
document.getElementById('btn-msave').addEventListener('click', svn);
mbg.addEventListener('click', e=>{ if(e.target===mbg) cmob(); });

// ─── AUTH ────────────────────────────────
function switchAuthTab(tab){
  document.getElementById('auth-tab-login').classList.toggle('on',tab==='login');
  document.getElementById('auth-tab-register').classList.toggle('on',tab==='register');
  document.getElementById('auth-form-login').style.display=tab==='login'?'flex':'none';
  document.getElementById('auth-form-register').style.display=tab==='register'?'flex':'none';
}
function addTap(id, handler){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',function(e){e.preventDefault();handler();},{passive:false});
  el.addEventListener('click',handler);
}
addTap('auth-tab-login',()=>switchAuthTab('login'));
addTap('auth-tab-register',()=>switchAuthTab('register'));

async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const err=document.getElementById('auth-login-err');
  err.textContent='';
  if(!email||!password){err.textContent='ایمیل و رمز عبور الزامی است';return;}
  try{
    const resp=await fetch(API_URL+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:email, password})});
    if(!resp.ok){
      // Treat as mock in design preview
      MOCK_MODE = true;
      _saveUser({username: email.split('@')[0], email: email});
      hideAuthModal();
      _runPending();
      return;
    }
    const data=await resp.json();
    setToken(data.token || data.access_token);
    _saveUser({username: data.username || email.split('@')[0], email: email});
    hideAuthModal();
    await loadUserData();
    _runPending();
  }catch(e){
    MOCK_MODE = true;
    _saveUser({username: email.split('@')[0], email: email});
    hideAuthModal();
    _runPending();
  }
}
async function doRegister(){
  const username=document.getElementById('auth-username').value.trim();
  const email=document.getElementById('auth-reg-email').value.trim();
  const password=document.getElementById('auth-reg-password').value;
  const err=document.getElementById('auth-register-err');
  err.textContent='';
  if(!username||!email||!password){err.textContent='همه فیلدها الزامی است';return;}
  try{
    const resp=await fetch(API_URL+'/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
    if(!resp.ok){
      // Treat as mock for design preview
      MOCK_MODE = true;
      _saveUser({username, email});
      hideAuthModal();
      _runPending();
      return;
    }
    document.getElementById('auth-email').value=email;
    document.getElementById('auth-password').value=password;
    switchAuthTab('login');
    await doLogin();
  }catch(e){
    MOCK_MODE = true;
    _saveUser({username, email});
    hideAuthModal();
    _runPending();
  }
}

function _runPending(){
  const p = _pendingAction; _pendingAction=null;
  if(!p){
    // refresh current view if profile
    if(curView==='profile') showProfile();
    return;
  }
  if(p.type==='bm'){ toggleBm(p.tp, p.id, p.ci); return; }
  if(p.type==='note'){
    // restore the note draft and re-open save flow
    const k = bkey(p.tp,p.id,p.ci);
    if(p.text){
      _nts[k] = p.text;
      _saveMockBms();
    }
    if(curView==='gh') showG(cg);
    else if(curView==='tr') showT(ct);
    return;
  }
}
addTap('auth-login-btn',doLogin);
addTap('auth-register-btn',doRegister);
document.getElementById('auth-email').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('auth-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('auth-reg-password').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});

// ─── TWEAKS PANEL ────────────────────────
const twPanel = document.getElementById('tw-panel');
function setTweak(key, val){
  TWEAKS[key] = val;
  twPanel.querySelectorAll('[data-tweak="'+key+'"] button').forEach(b=>{
    b.classList.toggle('on', b.dataset.v===val);
  });
  try{ window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[key]:val}}, '*'); }catch(e){}
  if(curView==='kw') renderKeywordList();
  else if(curView==='gh' && cg) showG(cg);
}
function openTweaks(){ twPanel.classList.add('open'); }
function closeTweaks(){ twPanel.classList.remove('open'); try{ window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); }catch(e){} }
twPanel.addEventListener('click', e=>{
  const b = e.target.closest('button[data-v]');
  if(b){ const key = b.parentElement.dataset.tweak; setTweak(key, b.dataset.v); }
});
document.getElementById('tw-close').addEventListener('click', closeTweaks);
window.addEventListener('message', e=>{
  const d = e.data||{};
  if(d.type==='__activate_edit_mode') openTweaks();
  else if(d.type==='__deactivate_edit_mode') closeTweaks();
});
try{ window.parent.postMessage({type:'__edit_mode_available'}, '*'); }catch(e){}

  try{
    const data = await apiFetch(API_URL+'/keywords?limit=250');

}

loadUserData();

showHome(); // show immediately, will re-render after data loads

})();
